<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">AI Flashcards screenshot-style preview</title>
  <desc id="desc">A dark dashboard preview for an AI flashcard generator.</desc>
  <rect width="1280" height="800" fill="#050505"/>
  <rect x="72" y="64" width="1136" height="672" rx="22" fill="#151515" stroke="#ba0c2f" stroke-width="5"/>
  <text x="126" y="145" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">AI Flashcards</text>
  <text x="128" y="190" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="24">Generate study cards from a prompt, topic, or notes.</text>
  <rect x="128" y="250" width="1024" height="92" rx="12" fill="#1f1f1f" stroke="#3a3a3a"/>
  <text x="160" y="306" fill="#9f9f9f" font-family="Arial, Helvetica, sans-serif" font-size="28">Machine learning vocabulary for my AI exam...</text>
  <rect x="128" y="382" width="300" height="220" rx="16" fill="#ba0c2f"/>
