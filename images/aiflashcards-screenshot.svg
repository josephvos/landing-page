  <text x="170" y="470" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Prompt</text>
  <text x="532" y="470" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Definition</text>
  <text x="894" y="470" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Review</text>
  <text x="170" y="520" fill="#f4d4dc" font-family="Arial, Helvetica, sans-serif" font-size="21">Topic-aware flashcards</text>
  <text x="532" y="520" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="21">Clean card layout</text>
  <text x="894" y="520" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="21">Study workflow</text>
