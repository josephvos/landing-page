  <text x="128" y="190" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="24">Fetch transcripts, translate captions, and track progress in real time.</text>
  <rect x="128" y="248" width="1024" height="76" rx="12" fill="#1f1f1f" stroke="#3a3a3a"/>
