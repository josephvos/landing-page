  <text x="160" y="528" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">00:18  Forestry datasets...</text>
  <text x="714" y="482" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">00:12  Aprendizaje automatico...</text>
  <text x="714" y="528" fill="#bfbfbf" font-family="Arial, Helvetica, sans-serif" font-size="22">00:18  Datos forestales...</text>
